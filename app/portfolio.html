<!DOCTYPE html>
<html lang="ru">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">

                    <li class="header__item ">

                        <div class="work__item-img"></div>
                        <div class="name">
                            <p class="name__subtitle">ЛЕНДИНГ</p>

                        </div>
                    </div>
                    <div class="work__item work__item--4">

                    </div>
                    <div class="work__item work__item--7">
                        <!-- <img class="work__item-img" src="images/bio-img.png" alt=""> -->

                            <p class="name__subtitle">WEB DESIGNING</p>
                            <p class="name__title">Остальные появятся позже</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container">
            <a class="footer__logo-link" href=""><img class="footer__logo" src="images/logo.png" alt=""></a>
            <ul class="footer__lists">
                <li class="footer__item"><a class="footer__item-link" href="">Главная</a></li>
                <li class="footer__item"><a class="footer__item-link" href="">Работы</a></li>
